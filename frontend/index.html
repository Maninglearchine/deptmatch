<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>금융공시 모니터링</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    /* 백엔드 URL 주입 — 로컬: localhost, 운영: 배포 서버 주소로 교체 */
    window.ENV_API_BASE = 'https://maninglearchine-deptmatch-api.hf.space/api/v1';
  </script>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="header-logo">금융공시 모니터링</a>
    <nav class="header-nav">
      <a href="about.html" class="nav-link">About</a>
    </nav>
  </div>
</header>

<!-- ── LAYOUT ─────────────────────────────────────────────── -->
<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">기간</div>
      <div class="range-group">
        <button class="range-btn" data-range="D">D</button>
        <button class="range-btn" data-range="W">W</button>
        <button class="range-btn active" data-range="M">M</button>
        <button class="range-btn" data-range="ALL">ALL</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">기관</div>
      <ul class="filter-list" id="agencyFilter">
        <li><label><input type="checkbox" value="all" checked /> <span>전체</span></label></li>
        <li><label><input type="checkbox" value="금융감독원" checked /> <span class="agency-dot fss"></span>금융감독원 <em class="count" id="cnt-금융감독원">0</em></label></li>
        <li><label><input type="checkbox" value="금융위원회" checked /> <span class="agency-dot fsc"></span>금융위원회 <em class="count" id="cnt-금융위원회">0</em></label></li>
        <li><label><input type="checkbox" value="금융정보분석원" checked /> <span class="agency-dot kofiu"></span>금융정보분석원 <em class="count" id="cnt-금융정보분석원">0</em></label></li>
        <li><label><input type="checkbox" value="법령해석포털" checked /> <span class="agency-dot moleg"></span>법령해석포털 <em class="count" id="cnt-법령해석포털">0</em></label></li>
        <li><label><input type="checkbox" value="한국은행" checked /> <span class="agency-dot bok"></span>한국은행 <em class="count" id="cnt-한국은행">0</em></label></li>
      </ul>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">카테고리</div>
      <ul class="filter-list" id="categoryFilter">
        <li><label><input type="checkbox" value="all" checked /> <span>전체</span></label></li>
        <li><label><input type="checkbox" value="보도자료" checked /> 보도자료</label></li>
        <li><label><input type="checkbox" value="고시·공고" checked /> 고시·공고</label></li>
        <li><label><input type="checkbox" value="의결결과" checked /> 의결결과</label></li>
        <li><label><input type="checkbox" value="법령해석" checked /> 법령해석</label></li>
        <li><label><input type="checkbox" value="제재공시" checked /> 제재공시</label></li>
      </ul>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">신뢰도 필터</div>
      <div class="conf-filter">
        <input type="range" id="confSlider" min="0" max="100" value="0" class="slider" />
        <div class="conf-filter-labels">
          <span>0%</span>
          <span id="confVal">0% 이상</span>
          <span>100%</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">담당 부서</div>
      <div class="dept-search-wrap">
        <input type="text" id="deptSearch" class="dept-input" placeholder="부서명 검색..." />
      </div>
      <ul class="filter-list dept-list" id="deptFilter"></ul>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="main-toolbar">
      <div class="result-count"><span id="totalCount">0</span>건</div>
      <div class="toolbar-right">
        <label class="review-toggle">
          <input type="checkbox" id="showReviewOnly" />
          <span>수동검토 필요만 보기</span>
        </label>
      </div>
    </div>

    <div id="feedList" class="feed-list"></div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- ── MODAL: 공시 상세 ─────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
